<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Admin Login — TRAIN4LIFE</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Helvetica, Arial, sans-serif;
      background: #f4f4f5; color: #111; min-height: 100vh;
      display: flex; align-items: center; justify-content: center;
    }
    .login-wrap {
      background: #fff; border: 1px solid #e4e4e7; border-radius: 16px;
      padding: 40px 36px; width: 100%; max-width: 380px;
      box-shadow: 0 4px 24px rgba(0,0,0,0.07);
    }
    .login-logo {
      font-size: 1.3rem; font-weight: 900; letter-spacing: 2px;
      text-align: center; color: #111; margin-bottom: 4px;
    }
    .login-logo span { color: #CC0000; }
    .login-sub {
      font-size: 0.72rem; font-weight: 700; color: #9ca3af;
      text-align: center; letter-spacing: 2px; text-transform: uppercase;
      margin-bottom: 32px;
    }
    .error-box {
      background: #fee2e2; border: 1px solid #fecaca; border-radius: 8px;
      padding: 10px 14px; color: #b91c1c; font-size: 0.83rem; font-weight: 600;
      margin-bottom: 18px;
    }
    label {
      display: block; font-size: 0.72rem; font-weight: 700;
      color: #374151; letter-spacing: 0.5px; margin-bottom: 6px;
    }
    input[type="password"] {
      width: 100%; border: 1px solid #d1d5db; border-radius: 8px;
      padding: 10px 14px; font-size: 0.95rem; color: #111; background: #fff;
      margin-bottom: 20px; outline: none; transition: border-color 0.15s, box-shadow 0.15s;
    }
    input[type="password"]:focus { border-color: #CC0000; box-shadow: 0 0 0 3px rgba(204,0,0,0.08); }
    .login-btn {
      width: 100%; background: #CC0000; border: none; border-radius: 8px;
      padding: 11px; color: #fff; font-size: 0.9rem; font-weight: 800;
      letter-spacing: 1px; cursor: pointer; transition: filter 0.15s;
    }
    .login-btn:hover { filter: brightness(1.1); }
    .login-back {
      display: block; text-align: center; margin-top: 20px;
      font-size: 0.78rem; color: #9ca3af; text-decoration: none;
    }
    .login-back:hover { color: #374151; }
  </style>
</head>
<body>
  <div class="login-wrap">
    <div class="login-logo">TRAIN<span>4</span>LIFE</div>
    <div class="login-sub">Admin Access</div>

    {% if error %}
    <div class="error-box">{{ error }}</div>
    {% endif %}

    <form method="POST">
      <label>PASSWORD</label>
      <input type="password" name="password" autofocus required autocomplete="current-password">
      <button type="submit" class="login-btn">ENTER</button>
    </form>

    <a href="/" class="login-back">← Back to site</a>
  </div>
</body>
</html>
